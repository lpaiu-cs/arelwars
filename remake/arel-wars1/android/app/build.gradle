apply plugin: 'com.android.application'

import java.util.Properties

def debugKeystoreFile = file(System.getProperty("user.home") + "/.android/debug.keystore")
def releaseKeystoreProperties = new Properties()
def releaseKeystorePropertiesFile = rootProject.file('keystore.properties')
if (releaseKeystorePropertiesFile.exists()) {
    releaseKeystorePropertiesFile.withInputStream { stream ->
        releaseKeystoreProperties.load(stream)
    }
}
def releaseValue = { String envKey, String propertyKey ->
    def envValue = System.getenv(envKey)
    if (envValue != null && !envValue.trim().isEmpty()) {
        return envValue.trim()
    }
    def propValue = releaseKeystoreProperties.getProperty(propertyKey)
    return propValue != null && !propValue.trim().isEmpty() ? propValue.trim() : null
}
def releaseStoreFilePath = releaseValue('AREL_WARS_KEYSTORE_PATH', 'storeFile')
def releaseStorePassword = releaseValue('AREL_WARS_KEYSTORE_PASSWORD', 'storePassword')
def releaseKeyAlias = releaseValue('AREL_WARS_KEY_ALIAS', 'keyAlias')
def releaseKeyPassword = releaseValue('AREL_WARS_KEY_PASSWORD', 'keyPassword')
def hasConfiguredReleaseKeystore = releaseStoreFilePath && releaseStorePassword && releaseKeyAlias && releaseKeyPassword

android {
    namespace = "com.arelwars.recovery"
    signingConfigs {
        localRelease {
            if (debugKeystoreFile.exists()) {
                storeFile debugKeystoreFile
                storePassword "android"
                keyAlias "androiddebugkey"
                keyPassword "android"
            }
        }
        release {
            if (hasConfiguredReleaseKeystore) {
                storeFile file(releaseStoreFilePath)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
                enableV1Signing true
                enableV2Signing true
                enableV3Signing true
                enableV4Signing true
            }
        }
    }
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.arelwars.recovery"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    lint {
        checkReleaseBuilds true
        abortOnError true
    }
    packaging {
        resources {
            excludes += ['/META-INF/{AL2.0,LGPL2.1}']
        }
    }
    buildTypes {
        debug {
            minifyEnabled false
            shrinkResources false
        }
        release {
            if (hasConfiguredReleaseKeystore) {
                signingConfig signingConfigs.release
            } else if (debugKeystoreFile.exists()) {
                signingConfig signingConfigs.localRelease
            }
            debuggable false
            minifyEnabled true
            shrinkResources true
            zipAlignEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.webkit:webkit:$androidxWebkitVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
